<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qinghai Panoramas | Will's Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="qinghai.css">
   <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>

    <a href="index.html" class="btn-back">← Back to Home</a>

    <main class="gallery-track">
        
        <article class="pano-item">
            <img src="images/pano.webp" alt="Qinghai Lake Panorama" loading="lazy">
            <div class="pano-caption">
                <h3>Qinghai G6 Highway</h3>
                <p>Canon R5 | Panorama - 31mm | f/8</p>
            </div>
        </article>

        <article class="pano-item">
            <img src="images/pano2.webp" alt="Chaka Salt Lake" loading="lazy">
            <div class="pano-caption">
                <h3>QingHai Lake</h3>
                <p>Canon R5 | Panorama - 42mm | f/4</p>
            </div>
        </article>

        <article class="pano-item">
            <img src="images/qjpano.webp" alt="Qunjia Forest" loading="lazy">
            <div class="pano-caption">
                <h3>Qunjia National Park</h3>
                <p>DJI Mini 3 Pro | 24mm | f/1.7</p>
            </div>
        </article>

        <article class="pano-item end-credits">
            <h2>THE END.</h2>
        </article>

    </main>
<script>
    const track = document.querySelector('.gallery-track');

    // --- 1. 电脑端逻辑 (保持不变) ---
    track.addEventListener('wheel', (event) => {
        if (Math.abs(event.deltaX) > Math.abs(event.deltaY)) return;
        if (event.deltaY !== 0) {
            event.preventDefault(); 
            track.scrollBy({
                left: event.deltaY * 0.8,
                behavior: 'auto' 
            });
        }
    }, { passive: false });

    // --- 2. 手机端逻辑 (全能进化版) ---
    let startY = 0;
    let startX = 0;

    track.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        startX = e.touches[0].clientX;
    }, { passive: false });

    track.addEventListener('touchmove', (e) => {
        const currentY = e.touches[0].clientY;
        const currentX = e.touches[0].clientX;

        // 计算手指移动的距离
        const diffY = startY - currentY;
        const diffX = startX - currentX;

        // 核心逻辑：不管是上下划还是左右划，我们都把它转化为横向滚动
        // 这样就彻底绕过了系统的下拉刷新拦截
        
        // 如果垂直滑动更明显，劫持它！
        if (Math.abs(diffY) > Math.abs(diffX)) {
            e.preventDefault(); // 阻止下拉刷新
            track.scrollLeft += diffY;
        } 
        // 如果水平滑动更明显，我们也手动接管它（因为设置了 touch-action: none）
        else {
            track.scrollLeft += diffX;
        }

        // 更新起点
        startY = currentY;
        startX = currentX;
    }, { passive: false });
</script>
</body>
</html>
